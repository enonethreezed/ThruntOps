ludus:
  - vm_name: "{{ range_id }}-elastic"
    hostname: "{{ range_id }}-elastic"
    template: debian-12-x64-server-template
    vlan: 50
    ip_last_octet: 1
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
    roles:
      - badsectorlabs.ludus_elastic_container
    role_vars:
      ludus_elastic_password: "thisisapassword"
  - vm_name: "{{ range_id }}-ad-dc-win2022-server-x64"
    hostname: "{{ range_id }}-DC01-2022"
    template: win2022-server-x64-template
    vlan: 50
    ip_last_octet: 11
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
    domain:
      fqdn: thruntops.domain
      role: primary-dc
    roles:
      - badsectorlabs.ludus_elastic_agent
      - ludus_ad_content
    role_vars:
      ludus_ad:
        users:
          - name: basicdomainuser
            firstname: Basic
            surname: DomainUser
            display_name: Basic Domain User
            password: password
            path: "DC=thruntops,DC=domain"
            description: Low privilege domain user
            groups:
              - Domain Users
          - name: pkiadmin
            firstname: PKI
            surname: Admin
            display_name: PKI Admin
            password: password
            path: "DC=thruntops,DC=domain"
            description: PKI/ADCS administrator
            groups:
              - Domain Admins
        rdp_members:
          - "thruntops\\domainadmin"
          - "thruntops\\domainuser"
          - "thruntops\\basicdomainuser"
          - "thruntops\\pkiadmin"
  - vm_name: "{{ range_id }}-ad-dc-win2022-secondary"
    hostname: "{{ range_id }}-DC01-SEC"
    template: win2022-server-x64-template
    vlan: 50
    ip_last_octet: 12
    ram_gb: 8
    cpus: 4
    windows:
      sysprep: false
    domain:
      fqdn: secondary.thruntops.domain
      role: primary-dc
    roles:
      - badsectorlabs.ludus_elastic_agent
      - ludus_ad_content
    role_vars:
      ludus_ad:
        users:
          - name: basicdomainuser
            firstname: Basic
            surname: DomainUser
            display_name: Basic Domain User
            password: password
            path: "DC=secondary,DC=thruntops,DC=domain"
            description: Low privilege domain user
            groups:
              - Domain Users
        rdp_members:
          - "secondary\\domainadmin"
          - "secondary\\domainuser"
          - "secondary\\basicdomainuser"
  - vm_name: "{{ range_id }}-ad-win11-22h2-enterprise-x64-1"
    hostname: "{{ range_id }}-WIN11-22H2-1"
    template: win11-22h2-x64-enterprise-template
    vlan: 50
    ip_last_octet: 21
    ram_gb: 8
    cpus: 4
    windows:
      install_additional_tools: true
      office_version: 2019
      office_arch: 64bit
    domain:
      fqdn: thruntops.domain
      role: member
    roles:
      - badsectorlabs.ludus_elastic_agent
      - ludus_local_users
    role_vars:
      ludus_local_users:
        - login: basicuser
          password: password
      ludus_local_groups:
        - name: Remote Desktop Users
          members:
            - localuser
            - basicuser
            - "thruntops\\domainadmin"
            - "thruntops\\domainuser"
            - "thruntops\\basicdomainuser"
  - vm_name: "{{ range_id }}-ad-win11-22h2-enterprise-x64-2"
    hostname: "{{ range_id }}-WIN11-22H2-2"
    template: win11-22h2-x64-enterprise-template
    vlan: 50
    ip_last_octet: 22
    ram_gb: 8
    cpus: 4
    windows:
      install_additional_tools: true
      office_version: 2019
      office_arch: 64bit
    domain:
      fqdn: secondary.thruntops.domain
      role: member
    roles:
      - badsectorlabs.ludus_elastic_agent
      - ludus_local_users
    role_vars:
      ludus_local_users:
        - login: basicuser
          password: password
      ludus_local_groups:
        - name: Remote Desktop Users
          members:
            - localuser
            - basicuser
            - "secondary\\domainadmin"
            - "secondary\\domainuser"
            - "secondary\\basicdomainuser"
  - vm_name: "{{ range_id }}-adcs"
    hostname: "{{ range_id }}-ADCS"
    template: win2022-server-x64-template
    vlan: 50
    ip_last_octet: 13
    ram_gb: 4
    cpus: 2
    windows:
      sysprep: false
    domain:
      fqdn: thruntops.domain
      role: member
    roles:
      - badsectorlabs.ludus_elastic_agent
      - badsectorlabs.ludus_adcs
      - ludus_local_users
    role_vars:
      ludus_local_users:
        - login: basicuser
          password: password
      ludus_local_groups:
        - name: Remote Desktop Users
          members:
            - localuser
            - basicuser
            - "thruntops\\domainadmin"
            - "thruntops\\domainuser"
            - "thruntops\\basicdomainuser"
            - "thruntops\\pkiadmin"
  - vm_name: "{{ range_id }}-kali"
    hostname: "{{ range_id }}-kali"
    template: kali-x64-desktop-template
    vlan: 50
    ip_last_octet: 250
    ram_gb: 8
    cpus: 4
    linux: true
    testing:
      snapshot: false
      block_internet: false
