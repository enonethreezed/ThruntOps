---
# Runs delegated to the DC for the given domain
# Caller must set: smb_dc_host, smb_domain_short, smb_groups, smb_admin_password

- name: (smb_shares) Create AD group {{ item.name }} in {{ smb_domain_short }}
  community.windows.win_domain_group:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    scope: global
    category: security
    state: present
  loop: "{{ smb_groups }}"
  delegate_to: "{{ smb_dc_host }}"

- name: (smb_shares) Add members to {{ item.name }} in {{ smb_domain_short }}
  community.windows.win_domain_group_membership:
    name: "{{ item.name }}"
    members: "{{ item.members }}"
    state: present
  loop: "{{ smb_groups }}"
  delegate_to: "{{ smb_dc_host }}"
