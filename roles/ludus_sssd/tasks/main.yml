---
- name: (SSSD) Install required packages
  ansible.builtin.apt:
    name:
      - sssd
      - sssd-ad
      - realmd
      - adcli
      - krb5-user
      - packagekit
      - samba-common-bin
      - oddjob
      - oddjob-mkhomedir
    state: present
    update_cache: true

- name: (SSSD) Detect default network interface
  ansible.builtin.shell: |
    ip route show default | awk '/default/ {print $5}' | head -1
  register: sssd_default_iface
  changed_when: false
  when: ludus_sssd_dns_servers | length > 0

- name: (SSSD) Configure DNS servers on default interface for AD domain resolution
  ansible.builtin.command: >
    resolvectl dns {{ sssd_default_iface.stdout }} {{ ludus_sssd_dns_servers | join(' ') }}
  when: ludus_sssd_dns_servers | length > 0 and sssd_default_iface.stdout | length > 0
  changed_when: true

- name: (SSSD) Configure domain search list on default interface
  ansible.builtin.command: >
    resolvectl domain {{ sssd_default_iface.stdout }}
    {{ ([ludus_sssd_domain] + (ludus_sssd_extra_domains | map(attribute='domain') | list)) | join(' ') }}
  when: ludus_sssd_dns_servers | length > 0 and sssd_default_iface.stdout | length > 0
  changed_when: true

- name: (SSSD) Persist DNS servers in /etc/network/interfaces
  ansible.builtin.replace:
    path: /etc/network/interfaces
    regexp: '(\s*dns-nameservers\s+)(.+)$'
    replace: '\g<1>\g<2> {{ ludus_sssd_dns_servers | join(" ") }}'
  when: ludus_sssd_dns_servers | length > 0

- name: (SSSD) Check joined realms
  ansible.builtin.command: realm list
  register: realm_list
  changed_when: false

- name: (SSSD) Join primary domain
  ansible.builtin.expect:
    command: >
      realm join
      --user={{ ludus_sssd_bind_user }}
      {% if ludus_sssd_ou %}--computer-ou="{{ ludus_sssd_ou }}"{% endif %}
      {{ ludus_sssd_domain }}
    responses:
      Password.*: "{{ ludus_sssd_bind_password }}"
    timeout: 60
  when: ludus_sssd_domain not in realm_list.stdout

- name: (SSSD) Join extra domains via realm (when no dc_ip specified)
  ansible.builtin.expect:
    command: >
      realm join
      --user={{ item.bind_user }}
      {{ item.domain }}
    responses:
      Password.*: "{{ item.bind_password }}"
    timeout: 60
  loop: "{{ ludus_sssd_extra_domains }}"
  when: item.domain not in realm_list.stdout and item.dc_ip is not defined

- name: (SSSD) Join extra domains via adcli (when dc_ip specified, for split-DNS environments)
  ansible.builtin.shell: |
    echo '{{ item.bind_password }}' | adcli join {{ item.domain }} \
      --login-user={{ item.bind_user }} \
      --domain-controller={{ item.dc_ip }} \
      --stdin-password
  loop: "{{ ludus_sssd_extra_domains }}"
  when: item.domain not in realm_list.stdout and item.dc_ip is defined
  no_log: true

- name: (SSSD) Deploy sssd.conf
  ansible.builtin.template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    mode: '0600'
  notify: Restart SSSD

- name: (SSSD) Enable automatic home directory creation
  ansible.builtin.command: pam-auth-update --enable mkhomedir
  changed_when: true

- name: (SSSD) Restrict SSH access to specific AD users
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} SSSD AD SSH USERS"
    block: |
      AllowUsers {{ ludus_sssd_ssh_users }}
  when: ludus_sssd_ssh_users | length > 0
  notify: Restart SSH

- name: (SSSD) Start and enable SSSD
  ansible.builtin.service:
    name: sssd
    state: started
    enabled: true
