---
- name: (LAPS) Check if Windows LAPS cmdlets already available
  ansible.windows.win_powershell:
    script: |
      $cmd = Get-Command Update-LapsADSchema -ErrorAction SilentlyContinue
      if ($cmd) { $Ansible.Result = "available" } else { $Ansible.Result = "missing" }
      $Ansible.Changed = $false
  register: laps_check

- name: (LAPS) Install Windows Updates to get built-in LAPS (requires KB5025230+)
  ansible.windows.win_updates:
    category_names:
      - SecurityUpdates
      - CriticalUpdates
    reboot: true
    reboot_timeout: 600
  when: laps_check.result == "missing"

- name: (LAPS) Verify Windows LAPS cmdlets are available after update
  ansible.windows.win_powershell:
    script: |
      $cmd = Get-Command Update-LapsADSchema -ErrorAction SilentlyContinue
      if (-not $cmd) {
        throw "Windows LAPS cmdlets still not available after update. Manual intervention required."
      }
      $Ansible.Changed = $false

- name: (LAPS) Extend AD schema with msLAPS attributes
  ansible.windows.win_powershell:
    script: |
      Update-LapsADSchema -Confirm:$false
      $Ansible.Changed = $true
  register: laps_schema
  failed_when: laps_schema.error | length > 0

- name: (LAPS) Grant computers self-write permission on domain root
  ansible.windows.win_powershell:
    script: |
      Set-LapsADComputerSelfPermission -Identity "{{ laps_domain_dn }}" -Confirm:$false
      $Ansible.Changed = $true
  vars:
    laps_domain_dn: "DC={{ ansible_domain.split('.') | join(',DC=') }}"

- name: (LAPS) Grant user03 read permission on LAPS passwords
  ansible.windows.win_powershell:
    script: |
      Set-LapsADReadPasswordPermission -Identity "{{ laps_domain_dn }}" `
        -AllowedPrincipals "{{ ludus_laps_read_principal }}" -Confirm:$false
      $Ansible.Changed = $true
  vars:
    laps_domain_dn: "DC={{ ansible_domain.split('.') | join(',DC=') }}"
  when: ludus_laps_read_principal is defined and ludus_laps_read_principal | length > 0
