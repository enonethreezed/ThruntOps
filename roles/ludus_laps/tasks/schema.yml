---
- name: (LAPS) Extend AD schema with msLAPS attributes
  ansible.windows.win_powershell:
    script: |
      Import-Module LAPS
      $result = Update-LapsADSchema -Confirm:$false
      $Ansible.Changed = $true
  register: laps_schema
  failed_when: laps_schema.error | length > 0

- name: (LAPS) Grant computers self-write permission on domain root
  ansible.windows.win_powershell:
    script: |
      Import-Module LAPS
      Set-LapsADComputerSelfPermission -Identity "{{ laps_domain_dn }}" -Confirm:$false
      $Ansible.Changed = $true
  vars:
    laps_domain_dn: "DC={{ ansible_domain.split('.') | join(',DC=') }}"

- name: (LAPS) Grant user03 read permission on LAPS passwords
  ansible.windows.win_powershell:
    script: |
      Import-Module LAPS
      Set-LapsADReadPasswordPermission -Identity "{{ laps_domain_dn }}" `
        -AllowedPrincipals "{{ ludus_laps_read_principal }}" -Confirm:$false
      $Ansible.Changed = $true
  vars:
    laps_domain_dn: "DC={{ ansible_domain.split('.') | join(',DC=') }}"
  when: ludus_laps_read_principal is defined
