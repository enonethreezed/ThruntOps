---
# --- Health check ---
- name: (gitlab_runner) Wait for GitLab to be ready
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/users/sign_in"
    method: GET
    status_code: [200, 302]
  register: gitlab_health
  until: gitlab_health.status in [200, 302]
  retries: 30
  delay: 10

# --- Authenticate: try initial password, fall back to configured password ---
- name: (gitlab_runner) Read initial root password file
  ansible.builtin.slurp:
    src: /etc/gitlab/initial_root_password
  register: initial_pw_file
  ignore_errors: true

- name: (gitlab_runner) Extract initial root password
  ansible.builtin.set_fact:
    gitlab_try_password: "{{ initial_pw_file.content | b64decode | regex_search('Password: (.+)', '\\1') | first | trim }}"
  when: initial_pw_file is not failed

- name: (gitlab_runner) Use configured password if initial file missing
  ansible.builtin.set_fact:
    gitlab_try_password: "{{ ludus_gitlab_runner_root_password }}"
  when: initial_pw_file is failed

- name: (gitlab_runner) Authenticate via OAuth
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/oauth/token"
    method: POST
    body_format: json
    body:
      grant_type: password
      username: root
      password: "{{ gitlab_try_password }}"
    status_code: [200, 401]
  register: oauth_initial
  retries: 5
  delay: 10

- name: (gitlab_runner) Authenticate with configured password (fallback)
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/oauth/token"
    method: POST
    body_format: json
    body:
      grant_type: password
      username: root
      password: "{{ ludus_gitlab_runner_root_password }}"
    status_code: 200
  register: oauth_configured
  when: oauth_initial.status != 200

- name: (gitlab_runner) Set bearer token
  ansible.builtin.set_fact:
    gitlab_bearer: >-
      {{ (oauth_initial.status == 200)
         | ternary(oauth_initial.json.access_token,
                   oauth_configured.json.access_token) }}

# --- Create admin PAT ---
- name: (gitlab_runner) Create root personal access token via API
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/users/1/personal_access_tokens"
    method: POST
    headers:
      Authorization: "Bearer {{ gitlab_bearer }}"
    body_format: json
    body:
      name: "ansible-bootstrap-{{ ansible_date_time.epoch }}"
      scopes: ["api"]
    status_code: [200, 201]
  register: pat_result

- name: (gitlab_runner) Set root API token fact
  ansible.builtin.set_fact:
    root_token: "{{ pat_result.json.token }}"

# --- Set root password (only when initial password was used) ---
- name: (gitlab_runner) Set GitLab root password via API
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/users/1"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    body_format: json
    body:
      password: "{{ ludus_gitlab_runner_root_password }}"
      password_confirmation: "{{ ludus_gitlab_runner_root_password }}"
    status_code: 200
  when: oauth_initial.status == 200 and gitlab_try_password != ludus_gitlab_runner_root_password

# --- Project setup ---
- name: (gitlab_runner) Check if thruntops-web project exists
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/projects/root%2Fthruntops-web"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    status_code: [200, 404]
  register: project_check

- name: (gitlab_runner) Create thruntops-web project
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    body_format: json
    body:
      name: thruntops-web
      path: thruntops-web
      description: "ThruntOps internal web portal"
      visibility: internal
      initialize_with_readme: false
    status_code: 201
  register: project_create
  when: project_check.status == 404

- name: (gitlab_runner) Resolve project ID
  ansible.builtin.set_fact:
    webapp_project_id: >-
      {{ (project_check.status == 200)
         | ternary(project_check.json.id, project_create.json.id) }}

- name: (gitlab_runner) Get webdev user ID
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/users?username=webdev"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
  register: webdev_user

- name: (gitlab_runner) Add webdev as maintainer on thruntops-web
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/projects/{{ webapp_project_id }}/members"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    body_format: json
    body:
      user_id: "{{ webdev_user.json[0].id }}"
      access_level: 40
    status_code: [201, 409]

- name: (gitlab_runner) Push initial app files and pipeline to project
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/projects/{{ webapp_project_id }}/repository/commits"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    body_format: json
    body:
      branch: main
      start_branch: main
      commit_message: "Initial web application — ThruntOps internal portal"
      actions:
        - action: create
          file_path: ".gitlab-ci.yml"
          content: "{{ lookup('file', 'gitlab-ci.yml') | b64encode }}"
          encoding: base64
        - action: create
          file_path: "Default.aspx"
          content: "{{ lookup('file', 'app/Default.aspx') | b64encode }}"
          encoding: base64
        - action: create
          file_path: "Login.aspx"
          content: "{{ lookup('file', 'app/Login.aspx') | b64encode }}"
          encoding: base64
        - action: create
          file_path: "Upload.aspx"
          content: "{{ lookup('file', 'app/Upload.aspx') | b64encode }}"
          encoding: base64
        - action: create
          file_path: "View.aspx"
          content: "{{ lookup('file', 'app/View.aspx') | b64encode }}"
          encoding: base64
    status_code: [201, 400]

# --- GitLab Runner installation and registration ---
- name: (gitlab_runner) Install smbclient for CI/CD deployment
  ansible.builtin.apt:
    name: smbclient
    state: present
    update_cache: true

- name: (gitlab_runner) Add GitLab Runner apt repository
  ansible.builtin.shell: |
    curl -fsSL "https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh" | bash
  args:
    creates: /etc/apt/sources.list.d/runner_gitlab-runner.list

- name: (gitlab_runner) Install gitlab-runner
  ansible.builtin.apt:
    name: gitlab-runner
    state: present
    update_cache: true

- name: (gitlab_runner) Check if runner is already registered
  ansible.builtin.command:
    cmd: gitlab-runner list
  register: runner_list
  changed_when: false

- name: (gitlab_runner) Create instance runner via API (GitLab 17+)
  ansible.builtin.uri:
    url: "{{ ludus_gitlab_runner_gitlab_url }}/api/v4/user/runners"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ root_token }}"
    body_format: json
    body:
      runner_type: instance_type
      description: "ThruntOps Deploy Runner"
      tag_list: ["web-deploy"]
      run_untagged: true
    status_code: [200, 201]
  register: runner_create
  when: "'ThruntOps Deploy Runner' not in runner_list.stdout"

- name: (gitlab_runner) Register shell runner
  ansible.builtin.command:
    cmd: >
      gitlab-runner register
      --non-interactive
      --url "{{ ludus_gitlab_runner_gitlab_url }}"
      --token "{{ runner_create.json.token }}"
      --executor "shell"
      --description "ThruntOps Deploy Runner"
  when: "'ThruntOps Deploy Runner' not in runner_list.stdout"
  changed_when: true

- name: (gitlab_runner) Ensure gitlab-runner service is running
  ansible.builtin.service:
    name: gitlab-runner
    state: started
    enabled: true
