---
- name: (ART) Check if Invoke-AtomicRedTeam is already installed
  ansible.windows.win_powershell:
    script: |
      $module = Get-Module -ListAvailable -Name Invoke-AtomicRedTeam -ErrorAction SilentlyContinue
      if ($module) { $Ansible.Result = "installed" } else { $Ansible.Result = "missing" }
      $Ansible.Changed = $false
  register: art_check

- name: (ART) Set PowerShell execution policy
  ansible.windows.win_powershell:
    script: |
      Set-ExecutionPolicy Bypass -Scope LocalMachine -Force
      $Ansible.Changed = $true
  when: art_check.result == "missing"

- name: (ART) Install NuGet provider (required for PSGallery)
  ansible.windows.win_powershell:
    script: |
      $provider = Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue
      if (-not $provider -or $provider.Version -lt [Version]"2.8.5.201") {
        Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope AllUsers
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  when: art_check.result == "missing"

- name: (ART) Trust PSGallery repository
  ansible.windows.win_powershell:
    script: |
      $repo = Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue
      if ($repo.InstallationPolicy -ne "Trusted") {
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  when: art_check.result == "missing"

- name: (ART) Install Invoke-AtomicRedTeam module
  ansible.windows.win_powershell:
    script: |
      Install-Module -Name invoke-atomicredteam -Scope AllUsers -Force
      $Ansible.Changed = $true
  when: art_check.result == "missing"

- name: (ART) Download Atomics library
  ansible.windows.win_powershell:
    script: |
      Import-Module Invoke-AtomicRedTeam
      $atomicsPath = "{{ ludus_art_install_path }}\atomics"
      if (-not (Test-Path $atomicsPath)) {
        Install-AtomicRedTeam -InstallPath "{{ ludus_art_install_path }}" -getAtomics -Force
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }
  when: ludus_art_get_atomics | bool

- name: (ART) Write profile import to PowerShell profile
  ansible.windows.win_powershell:
    script: |
      $profileDir = Split-Path $PROFILE.AllUsersAllHosts
      if (-not (Test-Path $profileDir)) { New-Item -ItemType Directory -Path $profileDir -Force | Out-Null }
      $line = 'Import-Module Invoke-AtomicRedTeam'
      $content = if (Test-Path $PROFILE.AllUsersAllHosts) { Get-Content $PROFILE.AllUsersAllHosts -Raw } else { "" }
      if ($content -notmatch [regex]::Escape($line)) {
        Add-Content -Path $PROFILE.AllUsersAllHosts -Value "`n$line"
        $Ansible.Changed = $true
      } else {
        $Ansible.Changed = $false
      }

- name: (ART) Verify installation
  ansible.windows.win_powershell:
    script: |
      Import-Module Invoke-AtomicRedTeam -ErrorAction Stop
      $atomicsPath = "{{ ludus_art_install_path }}\atomics"
      if (-not (Test-Path $atomicsPath)) {
        throw "Atomics directory not found at $atomicsPath"
      }
      $count = (Get-ChildItem $atomicsPath -Directory).Count
      $Ansible.Result = "Invoke-AtomicRedTeam installed, $count atomics available"
      $Ansible.Changed = $false
  register: art_verify

- name: (ART) Show installation result
  ansible.builtin.debug:
    msg: "{{ art_verify.result }}"
