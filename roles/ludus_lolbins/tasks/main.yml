---
# Source: https://github.com/Unit-259/lolbins (PowerShell Gallery: lolbins)

- name: (lolbins) Trust PSGallery and install module (AllUsers)
  ansible.windows.win_powershell:
    script: |
      Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
      if (-not (Get-Module -ListAvailable -Name lolbins)) {
        Install-Module -Name lolbins -Scope AllUsers -Force
        $Ansible.Changed = $true
      }

- name: (lolbins) Copy profile setup script
  ansible.windows.win_copy:
    src: lolbins_setup_profile.ps1
    dest: 'C:\Windows\Temp\lolbins_setup_profile.ps1'

- name: "(lolbins) Register logon task for {{ item.domain }}\\{{ item.username }}"
  ansible.windows.win_powershell:
    script: |
      $taskName = "lolbins-profile-{{ item.username }}"
      if (-not (Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue)) {
        $action   = New-ScheduledTaskAction `
                      -Execute "powershell.exe" `
                      -Argument "-NoProfile -NonInteractive -File C:\Windows\Temp\lolbins_setup_profile.ps1"
        $trigger  = New-ScheduledTaskTrigger -AtLogOn -User "{{ item.domain }}\{{ item.username }}"
        $settings = New-ScheduledTaskSettingsSet -ExecutionTimeLimit (New-TimeSpan -Minutes 5)
        Register-ScheduledTask -TaskName $taskName `
                               -Action $action `
                               -Trigger $trigger `
                               -Settings $settings `
                               -RunLevel Limited `
                               -Force | Out-Null
        $Ansible.Changed = $true
      }
  loop: "{{ ludus_lolbins_users }}"
