---
- name: Install IIS and ASP.NET features
  ansible.windows.win_feature:
    name:
      - Web-Server
      - Web-Asp-Net45
      - Web-Net-Ext45
      - Web-ISAPI-Ext
      - Web-ISAPI-Filter
      - Web-Mgmt-Console
      - Web-Mgmt-Service
      - NET-Framework-45-Core
      - NET-Framework-45-ASPNET
    state: present
    include_management_tools: true
  register: iis_install

- name: Reboot if required after IIS install
  ansible.windows.win_reboot:
    reboot_timeout: 300
  when: iis_install.reboot_required

- name: Enable Web Management Service
  ansible.windows.win_service:
    name: WMSVC
    state: started
    start_mode: auto

- name: Allow remote connections in Web Management Service
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\WebManagement\Server
    name: EnableRemoteManagement
    data: 1
    type: dword

- name: Create webadmin local user
  ansible.windows.win_user:
    name: "{{ ludus_iis_webadmin_user }}"
    password: "{{ ludus_iis_webadmin_password }}"
    state: present
    password_never_expires: true
    account_disabled: false
  when: ludus_iis_webadmin_user != ""

- name: Add webadmin to local Administrators
  ansible.windows.win_group_membership:
    name: Administrators
    members:
      - "{{ ludus_iis_webadmin_user }}"
    state: present
  when: ludus_iis_webadmin_user != ""

- name: Add webadmin to IIS_IUSRS
  ansible.windows.win_group_membership:
    name: IIS_IUSRS
    members:
      - "{{ ludus_iis_webadmin_user }}"
    state: present
  when: ludus_iis_webadmin_user != ""

- name: Set wwwroot ACL for webadmin
  ansible.windows.win_acl:
    path: C:\inetpub\wwwroot
    user: "{{ ludus_iis_webadmin_user }}"
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
    propagation: None
  when: ludus_iis_webadmin_user != ""
